<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Color</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* ===== SYSTEM ===== */
:root{
  --bg:#0A0A0A;
  --text:#FFFFFF;
  --muted:#AAAAAA;
  --primary:#FF3366;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== LAYOUT ===== */
.container{
  max-width:1100px;
  margin:auto;
  padding:80px 20px;
}

.center{text-align:center;}

img{
  display:block;
}

/* Only content images stretch */
.hero-img,
.section-img,
.story-visual img{
  width:100%;
  border-radius:16px;
}

/* ===== LOGO FIX (no stretch ever again) ===== */
header .logo{
  height:28px;
  width:auto !important;
  max-width:none !important;
  border-radius:0;
}

/* ===== BUTTON ===== */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:42px;
  padding:0 24px;
  border-radius:40px;
  background:var(--primary);
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:0.25s;
}

.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(255,51,102,0.25);
}

/* ===== HEADER ===== */
.nav{
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(10,10,10,0.7);
  backdrop-filter:blur(10px);
}

.nav-inner{
  max-width:1100px;
  margin:auto;
  padding:14px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* ===== HERO FULL WIDTH ===== */
.hero-full{
  padding:40px 20px 0;
}

.hero-wrap{
  max-width:1400px;
  margin:auto;
  background:radial-gradient(circle, rgba(255,51,102,0.12), transparent);
  padding:20px;
  border-radius:20px;
}

.hero-img{
  width:100%;
  border-radius:16px;
}

/* ===== STORY ===== */
.story{
  height:350vh;
}

.story-track{
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  max-width:1100px;
  margin:auto;
}

.story-step{
  opacity:0.25;
  font-size:2rem;
  margin-bottom:10px;
  transition:0.3s;
}

.story-step.active{
  opacity:1;
}

.story-visual{
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.story-visual img{
  width:60%;
  transition:opacity 0.3s ease;
}

/* ===== REVEAL ===== */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:0.8s;
}

.reveal.active{
  opacity:1;
  transform:translateY(0);
}

/* ===== FOOTER ===== */
.footer{
  text-align:center;
  color:#666;
  border-top:1px solid #1A1A1A;
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="nav">
  <div class="nav-inner">
    <img src="images/logo.png" class="logo">
    <a href="#" class="btn">Get audit →</a>
  </div>
</header>

<!-- HERO (FULL WIDTH, NO TEXT LEFT) -->
<section class="hero-full">

  <div class="hero-wrap">
    <img src="images/hero.jpg" class="hero-img">

    <div class="center" style="margin-top:24px;">
      <a href="#" class="btn">Get your free audit →</a>
    </div>
  </div>

</section>

<!-- STORY WORD-BY-WORD -->
<section class="story">

  <div class="story-track">
    <div class="story-step">Color</div>
    <div class="story-step">is</div>
    <div class="story-step">not</div>
    <div class="story-step">decoration.</div>

    <div class="story-step">Wrong</div>
    <div class="story-step">color</div>
    <div class="story-step">creates</div>
    <div class="story-step">hesitation.</div>

    <div class="story-step">Right</div>
    <div class="story-step">color</div>
    <div class="story-step">creates</div>
    <div class="story-step">action.</div>
  </div>

  <div class="story-visual">
    <img id="storyImage" src="images/before-after.jpg">
  </div>

</section>

<!-- BEFORE / AFTER -->
<section class="container center reveal">
  <h2>Same product. Better results.</h2>
  <img src="images/before-after.jpg" class="section-img">
</section>

<!-- CTA IMAGE -->
<section class="container center reveal">
  <h2>Small change. Big impact.</h2>
  <img src="images/cta-after.jpg" class="section-img">
</section>

<!-- PALETTE -->
<section class="container center reveal">
  <h2>Color with purpose.</h2>
  <img src="images/palette.jpg" class="section-img">
</section>

<!-- FOUNDER -->
<section class="container reveal">
  <img src="images/portrait.jpg" class="section-img">
</section>

<!-- FOOTER -->
<section class="container footer">
  © X Color
</section>

<script>

/* REVEAL */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add('active');
  });
});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

/* STORY FLOW */
const steps = document.querySelectorAll('.story-step');
const img = document.getElementById('storyImage');

const images = [
  "images/before-after.jpg",
  "images/cta-after.jpg",
  "images/palette.jpg"
];

window.addEventListener('scroll',()=>{
  let s = document.querySelector('.story');
  let progress = (scrollY - s.offsetTop) / s.offsetHeight;
  let i = Math.floor(progress * steps.length);

  if(i >= 0 && i < steps.length){
    steps.forEach((step,idx)=>{
      step.classList.toggle('active', idx===i);
    });

    let imgIndex = Math.floor(i / 4);
    img.src = images[imgIndex];
  }
});

</script>

</body>
</html>
